<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <main class="container">
        <h1>Save Our Wildlife</h1>

        <div class="video-wrapper">
            <video id="wildlife-video" controls aria-label="Promotional wildlife conservation video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <p class="description">
            Our planet's diverse ecosystems are under threat. Join us in our mission to protect endangered species, preserve critical natural habitats, and ensure a sustainable future for wildlife across the globe. Every action counts.
        </p>

        <button id="toggle-btn" class="control-btn" aria-live="polite">
            Play / Toggle Video
        </button>
    </main>

</body>
</html>
